<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">KHOMANGUON.IO.VN</title>
  <desc id="logoDesc">Logo của KHOMANGUON - Chợ sản phẩm số hàng đầu Việt Nam</desc>

  <defs>
    <!-- Premium 3D Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    
    <linearGradient id="secondaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Text Gradients -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="dotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Futuristic Icon: Dynamic Interconnected Cube -->
  <g transform="translate(10, 15)">
    <!-- Base geometric shadow -->
    <path d="M35 5 L65 22 L65 56 L35 73 L5 56 L5 22 Z" fill="url(#primaryGrad)" opacity="0.15" filter="url(#glow)"/>
    
    <!-- Outer hexagon lines -->
    <path d="M35 5 L65 22 L65 56 L35 73 L5 56 L5 22 Z" stroke="url(#primaryGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    
    <!-- Inner dimensional structures -->
    <path d="M35 5 L35 38" stroke="url(#secondaryGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M5 22 L35 38 L65 22" stroke="url(#secondaryGrad)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M35 73 L35 38" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Nodes/Connections -->
    <circle cx="35" cy="5" r="4" fill="#06B6D4" filter="url(#glow)"/>
    <circle cx="65" cy="22" r="3" fill="#3B82F6"/>
    <circle cx="65" cy="56" r="3" fill="#7C3AED"/>
    <circle cx="35" cy="73" r="4" fill="#EC4899" filter="url(#glow)"/>
    <circle cx="5" cy="56" r="3" fill="#4F46E5"/>
    <circle cx="5" cy="22" r="3" fill="#06B6D4"/>
    
    <!-- Center Core Energy -->
    <circle cx="35" cy="38" r="5" fill="url(#dotGradient)" filter="url(#glow)"/>
    
    <!-- Orbital Rings -->
    <path d="M15 15 Q35 -5 55 15" stroke="url(#secondaryGrad)" stroke-width="1.5" stroke-dasharray="4 2" fill="none" opacity="0.6"/>
  </g>

  <!-- Brand text: KHOMANGUON -->
  <text x="100" y="48"
    font-family="Outfit, Inter, system-ui, sans-serif"
    font-size="32"
    font-weight="900"
    fill="url(#textGradient)"
    letter-spacing="-0.5">KHOMANGUON</text>

  <!-- Subtitle: .IO.VN -->
  <text x="102" y="70"
    font-family="Outfit, Inter, system-ui, sans-serif"
    font-size="14"
    font-weight="800"
    fill="url(#primaryGrad)"
    letter-spacing="4">.IO.VN</text>

  <!-- Tagline / Decorative Elements -->
  <text x="175" y="70"
    font-family="Outfit, Inter, system-ui, sans-serif"
    font-size="10"
    font-weight="600"
    fill="#64748B"
    letter-spacing="2">| PREMIUM DIGITAL MARKET</text>

  <!-- Decorative line under text -->
  <line x1="102" y1="80" x2="330" y2="80" stroke="url(#primaryGrad)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <circle cx="330" cy="80" r="2" fill="#EC4899"/>
</svg>
